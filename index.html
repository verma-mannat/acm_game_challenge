<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brick Breaker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  h1 { color: #0ff; margin-top: 20px; }
  canvas {
    background: #000;
    border: 3px solid #0ff;
    margin-top: 10px;
    max-width: 95vw;
    height: auto;
    touch-action: none;
  }
  body {
    padding: 10px;
    box-sizing: border-box;
  }
  #info {
    margin-top: 10px;
    font-size: 18px;
  }
  #status {
    margin-top: 8px;
    font-size: 20px;
    color: #ff0;
    height: 24px;
  }
  #restartBtn {
    margin-top: 10px;
    padding: 8px 20px;
    font-size: 16px;
    background: #0ff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: none;
  }
</style>
</head>
<body>

<h1>ACM BRICK BREAKER</h1>
<canvas id="gameCanvas" width="480" height="400"></canvas>
<div id="info">Score: <span id="score">0</span> &nbsp;&nbsp; Lives: <span id="lives">3</span></div>
<div id="status"></div>
<button id="restartBtn">Restart</button>

<script>
// =====================================================
//  ACM CHALLENGE - BRICK BREAKER
//  This game has several intentional bugs.
//  Your job: find them, fix them, then add your own
//  twist/feature before submitting!
// =====================================================

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let score = 0;
let lives = 3;
let gameRunning = true;
let animationId;

// Ball
let ballRadius = 8;
let x = canvas.width / 2;
let y = canvas.height - 30;
let dx = 2;
let dy = -2;

// Paddle
let paddleHeight = 10;
let paddleWidth = 75;
let paddleX = (canvas.width - paddleWidth) / 2;

let rightPressed = false;
let leftPressed = false;

// Bricks
const brickRowCount = 4;
const brickColumnCount = 6;
const brickWidth = 60;
const brickHeight = 20;
const brickPadding = 10;
const brickOffsetTop = 30;
const brickOffsetLeft = 20;

let bricks = [];
for (let c = 0; c < brickColumnCount; c++) {
  bricks[c] = [];
  for (let r = 0; r < brickRowCount; r++) {
    bricks[c][r] = { x: 0, y: 0, status: 1 };
  }
}
// Make canvas responsive to small screens
function resizeCanvas() {
  const maxWidth = Math.min(480, window.innerWidth * 0.95);
  const scaleFactor = maxWidth / 480;
  canvas.style.width = maxWidth + "px";
  canvas.style.height = (400 * scaleFactor) + "px";
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

document.addEventListener("keydown", keyDownHandler);
document.addEventListener("keyup", keyUpHandler);

function keyDownHandler(e) {
  if (e.key === "Right" || e.key === "ArrowRight") {
    rightPressed = true;
  }
  else if (e.key === "Left" || e.key === "ArrowLeft") {
    leftPressed = true;
  }
}

function keyUpHandler(e) {
  if (e.key === "Right" || e.key === "ArrowRight") {
    rightPressed = false;
  } else if (e.key === "Left" || e.key === "ArrowLeft") {
    leftPressed = false;
  }
}
// Touch controls for mobile
canvas.addEventListener("touchstart", touchHandler, { passive: false });
canvas.addEventListener("touchmove", touchHandler, { passive: false });

function touchHandler(e) {
  e.preventDefault(); // stop scrolling/zooming while playing
  const rect = canvas.getBoundingClientRect();
  const touchX = e.touches[0].clientX - rect.left;
  // scale touch position to canvas internal coordinates
  const scale = canvas.width / rect.width;
  const scaledX = touchX * scale;
  paddleX = scaledX - paddleWidth / 2;

  // keep paddle inside canvas bounds
  if (paddleX < 0) paddleX = 0;
  if (paddleX > canvas.width - paddleWidth) paddleX = canvas.width - paddleWidth;
}

function collisionDetection() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      let b = bricks[c][r];
      if (b.status == 1) {
        // BUG: collision box check uses wrong comparison operators
        // so some bricks never register a hit properly
        if (
          x > b.x &&
          x < b.x + brickWidth &&
          y > b.y &&
          y < b.y + brickHeight
        ) {
          dy = -dy;
          b.status = 0;
          score++;
          // BUG: score display is never updated here
          document.getElementById("score").textContent = score; //fixed the bug
        }
      }
    }
  } 
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
  ctx.fillStyle = "#0ff";
  ctx.fill();
  ctx.closePath();
}

function drawPaddle() {
  ctx.beginPath();
  ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
  ctx.fillStyle = "#0ff";
  ctx.fill();
  ctx.closePath();
}

function drawBricks() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status == 1) {
        let brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
        let brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
        bricks[c][r].x = brickX;
        bricks[c][r].y = brickY;
        ctx.beginPath();
        ctx.rect(brickX, brickY, brickWidth, brickHeight);
        ctx.fillStyle = "#f0f";
        ctx.fill();
        ctx.closePath();
      }
    }
  }
}

function draw() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBricks();
  drawBall();
  drawPaddle();
  collisionDetection();

  // Wall collision (left/right)
  if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
    dx = -dx;
  }
  // Wall collision (top)
  if (y + dy < ballRadius) {
    dy = -dy;
  } else if (y + dy > canvas.height - paddleHeight - ballRadius) {
    if (
      y + dy < canvas.height - ballRadius &&
      x + ballRadius > paddleX &&
      x - ballRadius < paddleX + paddleWidth
    ) {
      dy = -dy;
    } else if (y + dy > canvas.height - ballRadius) {
        lives--;
        document.getElementById("lives").textContent = lives;//bug fixed
        if (lives <= 0) {
        endGame(false);
      } else {
        x = canvas.width / 2;
        y = canvas.height - 30;
        dx = 2;
        dy = -2;
        paddleX = (canvas.width - paddleWidth) / 2;
      }
    }
  }

  if (rightPressed && paddleX < canvas.width - paddleWidth) {
    paddleX += 5;
  } else if (leftPressed && paddleX > 0) {
    paddleX -= 5;
  }

  // Win condition check
  let bricksLeft = 0;
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status == 1) bricksLeft++;
    }
  }
  if (bricksLeft === 0) {
    endGame(true);
  }

  x += dx;
  y += dy;

  animationId = requestAnimationFrame(draw);
}

function endGame(won) {
  gameRunning = false;
  cancelAnimationFrame(animationId);
  document.getElementById("status").textContent = won
    ? "🎉 YOU WIN! 🎉"
    : "💀 GAME OVER 💀";
  document.getElementById("restartBtn").style.display = "inline-block";
}

document.getElementById("restartBtn").addEventListener("click", () => {
  location.reload();
});

draw();
</script>
</body>
</html>
